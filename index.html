let uid=1;TOPICS.forEach(t=>t.problems.forEach(p=>{p.id=uid++;}));
const TOTAL=TOPICS.reduce((s,t)=>s+t.problems.length,0);

const ST={
  get done(){try{return JSON.parse(localStorage.getItem('dsa3_done')||'{}')}catch{return{}}},
  set done(v){localStorage.setItem('dsa3_done',JSON.stringify(v))},
  get today(){try{return JSON.parse(localStorage.getItem('dsa3_today')||'[]')}catch{return[]}},
  set today(v){localStorage.setItem('dsa3_today',JSON.stringify(v))},
};

let CUR_FILTER='all', CUR_SEARCH='';
const dc=d=>d==='E'?'e':d==='M'?'m':'h';
const dn=d=>d==='E'?'Easy':d==='M'?'Medium':'Hard';
const allProbs=()=>TOPICS.flatMap(t=>t.problems.map(p=>({...p,topicId:t.id})));

const PHASE_MAP={1:['arrays','twoptr','sliding','stack'],2:['linked','binary','trees','heap'],3:['graphs','dp1d','dp2d','backtrack','intervals'],4:['trie','bitman','greedy','math','advanced']};
const PHASE_META=[
  {n:1,label:'Phase 1 · Foundations',color:'#3fb950',desc:'Arrays, hashing, two pointers, sliding window, stack. ~2–3 weeks.'},
  {n:2,label:'Phase 2 · Core Data Structures',color:'#d29922',desc:'Linked lists, binary search, trees & heaps — core FAANG interview topics. ~3–4 weeks.'},
  {n:3,label:'Phase 3 · Advanced Patterns',color:'#e3844b',desc:'Graphs, DP (1D+2D), backtracking, intervals — most asked by FAANG. ~5–7 weeks.'},
  {n:4,label:'Phase 4 · FAANG Elite',color:'#bc8cff',desc:'Tries, Bit Manipulation, Greedy, Math, Segment Trees — separates top candidates. ~3–4 weeks.'},
];

function matchFilter(p){
  const done=ST.done;
  if(CUR_FILTER==='E'&&p.d!=='E')return false;
  if(CUR_FILTER==='M'&&p.d!=='M')return false;
  if(CUR_FILTER==='H'&&p.d!=='H')return false;
  if(CUR_FILTER==='faang'&&!p.f)return false;
  if(CUR_FILTER==='todo'&&done[p.id])return false;
  if(CUR_SEARCH){const q=CUR_SEARCH.toLowerCase();if(!p.nm.toLowerCase().includes(q)&&!p.n.includes(q))return false;}
  return true;
}

function renderNav(){
  let h='';
  PHASE_META.forEach(ph=>{
    h+=`<h3 style="color:${ph.color}">${ph.label}</h3>`;
    TOPICS.filter(t=>PHASE_MAP[ph.n].includes(t.id)).forEach(t=>{
      h+=`<a class="nav-item" id="nav-${t.id}" href="#" onclick="scrollTo2('${t.id}');return false">
        <span class="nav-dot" style="background:${t.color}"></span>${t.label}
        <span class="nav-mini" id="n-${t.id}"></span></a>`;
    });
  });
  document.getElementById('sidebar').innerHTML=h;
}

function renderFlow(){
  let h='';
  PHASE_META.forEach((ph,i)=>{
    const border=ph.color.replace('#','')+'55';
    h+=`<div style="margin-bottom:9px">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
        <div style="padding:3px 11px;border-radius:5px;border:1px solid ${ph.color}55;color:${ph.color};font-size:11px;font-weight:700;cursor:pointer" onclick="document.getElementById('ph${ph.n}').scrollIntoView({behavior:'smooth'})">${ph.label}</div>
        ${i<3?'<span style="color:var(--text3);font-size:11px">→</span>':''}
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;padding-left:10px;border-left:2px solid var(--border);margin-left:9px">`;
    TOPICS.filter(t=>PHASE_MAP[ph.n].includes(t.id)).forEach(t=>{
      h+=`<span style="padding:2px 8px;border-radius:11px;font-size:10px;font-weight:500;border:1px solid ${t.color}44;background:${t.cdim};color:${t.color};cursor:pointer" onclick="scrollTo2('${t.id}')">${t.icon} ${t.label}</span>`;
    });
    h+='</div></div>';
  });
  document.getElementById('flow-diagram').innerHTML=h;
}

function renderContent(){
  const done=ST.done;const today=ST.today;
  let html='';
  PHASE_META.forEach(ph=>{
    const pts=TOPICS.filter(t=>PHASE_MAP[ph.n].includes(t.id));
    const pp=pts.flatMap(t=>t.problems);
    const pd=pp.filter(p=>done[p.id]).length;
    const ppct=pp.length?Math.round(pd/pp.length*100):0;
    html+=`<div class="phase-hdr" id="ph${ph.n}">
      <span class="phase-badge" style="background:${ph.color}1a;color:${ph.color};border:1px solid ${ph.color}44">Phase ${ph.n}</span>
      <h2>${ph.label}</h2>
      <div class="phase-prog-wrap">
        <div class="ph-bar"><div class="ph-fill" id="pp${ph.n}" style="width:${ppct}%;background:${ph.color}"></div></div>
        <span class="ph-pct" id="pct${ph.n}">${ppct}%</span>
      </div>
    </div>
    <p class="phase-desc">${ph.desc}</p>`;
    pts.forEach(t=>{
      const vis=t.problems.filter(p=>CUR_FILTER==='all'&&!CUR_SEARCH?true:matchFilter(p));
      if(vis.length===0&&(CUR_FILTER!=='all'||CUR_SEARCH))return;
      const dc2=t.problems.filter(p=>done[p.id]).length;
      const tot=t.problems.length;
      const pct=tot?Math.round(dc2/tot*100):0;
      html+=`<div class="topic-card" id="topic-${t.id}">
        <div class="topic-hd" onclick="toggleTopic('${t.id}')">
          <div class="t-icon" style="background:${t.cdim};border:1px solid ${t.color}44">${t.icon}</div>
          <span class="t-name">${t.label}</span>
          <span class="t-cnt">${dc2}/${tot}</span>
          <div class="mini-bar"><div class="mini-fill" style="width:${pct}%;background:${t.color}"></div></div>
          <span class="chev open" id="chev-${t.id}">▶</span>
        </div>
        <div class="t-body open" id="body-${t.id}">
          <div class="py-tip"><span style="color:${t.color};flex-shrink:0">🐍</span><span>${t.tip}</span></div>
          <table class="prob-tbl">`;
      vis.forEach(p=>{
        const isDone=!!done[p.id],isToday=today.includes(p.id);
        html+=`<tr class="${isDone?'done-row':''}" id="row-${p.id}">
          <td><div class="cb ${isDone?'done':''}" id="cb-${p.id}" onclick="toggleDone(${p.id},'${t.id}')"></div></td>
          <td class="p-num">#${p.n}</td>
          <td class="p-name"><a href="${p.u}" target="_blank" rel="noopener">${p.nm}</a>${p.f?'<span class="tag-f">FAANG</span>':''}</td>
          <td><span class="diff ${dc(p.d)}">${dn(p.d)}</span></td>
          <td><div class="p-acts"><button class="btn-t ${isToday?'mk':''}" id="btn-${p.id}" onclick="toggleToday(${p.id})">→ Today</button></div></td>
        </tr>`;
      });
      html+=`</table></div></div>`;
    });
  });
  document.getElementById('content').innerHTML=html;
}

function toggleDone(pid,tid){
  const done=ST.done;done[pid]=!done[pid];ST.done=done;
  const cb=document.getElementById(`cb-${pid}`);
  const row=document.getElementById(`row-${pid}`);
  if(done[pid]){cb&&cb.classList.add('done');row&&row.classList.add('done-row');}
  else{cb&&cb.classList.remove('done');row&&row.classList.remove('done-row');}
  updateStats();updateTopicProg(tid);updateNavCounts();
}

function toggleToday(pid){
  let t=ST.today;const i=t.indexOf(pid);
  if(i>=0)t.splice(i,1);else t.push(pid);
  ST.today=t;
  const btn=document.getElementById(`btn-${pid}`);
  if(btn)btn.classList.toggle('mk',t.includes(pid));
  renderTodayPanel();document.getElementById('s-today').textContent=t.length;
}

function toggleTopic(id){
  document.getElementById(`body-${id}`)?.classList.toggle('open');
  document.getElementById(`chev-${id}`)?.classList.toggle('open');
}

function setFilter(f){
  CUR_FILTER=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.f===f));
  renderContent();
}

function applySearch(){CUR_SEARCH=document.getElementById('search').value;renderContent();}

function updateTopicProg(tid){
  const t=TOPICS.find(x=>x.id===tid);if(!t)return;
  const done=ST.done;const dc2=t.problems.filter(p=>done[p.id]).length;
  const pct=t.problems.length?Math.round(dc2/t.problems.length*100):0;
  const c=document.querySelector(`#topic-${tid} .t-cnt`);
  const f=document.querySelector(`#topic-${tid} .mini-fill`);
  if(c)c.textContent=`${dc2}/${t.problems.length}`;if(f)f.style.width=pct+'%';
}

function updateStats(){
  const done=ST.done;const all=allProbs();
  const doneCount=all.filter(p=>done[p.id]).length;
  document.getElementById('s-total').textContent=TOTAL;
  document.getElementById('s-done').textContent=doneCount;
  document.getElementById('s-easy').textContent=all.filter(p=>p.d==='E'&&done[p.id]).length;
  document.getElementById('s-med').textContent=all.filter(p=>p.d==='M'&&done[p.id]).length;
  document.getElementById('s-hard').textContent=all.filter(p=>p.d==='H'&&done[p.id]).length;
  document.getElementById('s-pct').textContent=TOTAL?Math.round(doneCount/TOTAL*100)+'%':'0%';
  document.getElementById('g-bar').style.width=TOTAL?Math.round(doneCount/TOTAL*100)+'%':'0%';
  [1,2,3,4].forEach(ph=>{
    const pts=TOPICS.filter(t=>PHASE_MAP[ph].includes(t.id)).flatMap(t=>t.problems);
    const pd=pts.filter(p=>done[p.id]).length;
    const pp=pts.length?Math.round(pd/pts.length*100):0;
    const f=document.getElementById(`pp${ph}`);const c=document.getElementById(`pct${ph}`);
    if(f)f.style.width=pp+'%';if(c)c.textContent=pp+'%';
  });
}

function updateNavCounts(){
  const done=ST.done;
  TOPICS.forEach(t=>{
    const dc2=t.problems.filter(p=>done[p.id]).length;
    const el=document.getElementById(`n-${t.id}`);
    if(el)el.textContent=`${dc2}/${t.problems.length}`;
  });
}

function renderTodayPanel(){
  const today=ST.today;const all=allProbs();
  const list=document.getElementById('td-list');
  document.getElementById('td-cnt').textContent=today.length?`(${today.length})`:'';
  if(!today.length){list.innerHTML=`<li class="t-empty">Hit "→ Today" on any problem to queue it</li>`;return;}
  list.innerHTML=today.map(pid=>{
    const p=all.find(x=>x.id===pid);if(!p)return'';
    return`<li class="today-item">
      <span class="t-num">#${p.n}</span>
      <a class="t-nm" href="${p.u}" target="_blank" rel="noopener" style="text-decoration:none;color:var(--text);flex:1">${p.nm}</a>
      <span class="diff ${dc(p.d)}" style="font-size:9px">${dn(p.d)}</span>
    </li>`;
  }).join('');
}

function clearToday(){
  ST.today.forEach(pid=>{const b=document.getElementById(`btn-${pid}`);if(b)b.classList.remove('mk');});
  ST.today=[];renderTodayPanel();document.getElementById('s-today').textContent=0;
}

function exportToday(){
  const today=ST.today;if(!today.length){alert('No problems marked for today!');return;}
  const all=allProbs();
  const d=new Date().toDateString();
  const lines=[`# 📅 DSA Problems — ${d}`,`**Total:** ${today.length} problems`,``];
  today.forEach(pid=>{
    const p=all.find(x=>x.id===pid);
    if(p)lines.push(`- [ ] #${p.n} **${p.nm}** \`${dn(p.d)}\` — ${p.u}`);
  });
  lines.push(``,`---`,`> FAANG DSA Roadmap · Python Edition`);
  const blob=new Blob([lines.join('\n')],{type:'text/markdown'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`dsa-${new Date().toISOString().slice(0,10)}.md`;a.click();
}

function scrollTo2(id){
  const el=document.getElementById(`topic-${id}`);
  if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const nav=document.getElementById(`nav-${id}`);if(nav)nav.classList.add('active');
}

document.getElementById('td-date').textContent=new Date().toLocaleDateString('en-IN',{month:'short',day:'numeric'});
renderNav();renderFlow();renderContent();updateStats();updateNavCounts();renderTodayPanel();
</script>
</body>
